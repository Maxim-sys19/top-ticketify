  db_service:
    image: mysql:latest
    container_name: top-ticketify-mysql-db
    restart: always
    volumes:
      - ./mysql/allow-remote.cnf:/etc/mysql/conf.d/allow-remote.cnf
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_DATABASE: TopTicketify
    ports:
      - '3307:3306'
    networks:
      - top-ticketify_app-network

  maildev:
    image: maildev/maildev
    container_name: top-ticketify-maildev
    ports:
      - "1080:1080"
      - "1025:1025"

  redis_service:
    image: redis:latest
    container_name: redis_service_top_ticketify
    ports:
      - '6379:6379'
    networks:
      - top-ticketify_app-network

  rabbitmq_service:
    image: rabbitmq:3-management
    container_name: top-ticketify-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - top-ticketify_app-network

  stripe_service:
    image: stripe/stripe-cli:v1.32.0
    container_name: top-ticketify-stripe
    command: [ "listen", "--forward-to", "http://host.docker.internal:8000/webhook/stripe" ]
    env_file:
      - ./nest_server/.env
    environment:
      - STRIPE_API_KEY=${TEST_STRIPE_SECRET_KEY}
    volumes:
      - ./stripe:/root/.config/stripe
    ports:
      - "12111:12111"
    networks:
      - top-ticketify_app-network
    restart: unless-stopped

volumes:
  rabbitmq_data:
networks:
  top-ticketify_app-network:
    driver: bridge
