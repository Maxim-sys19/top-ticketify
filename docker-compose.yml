  phpstorm_remote:
    image: jetbrains-remote
    container_name: phpstorm-container
    hostname: "phpstorm-${RANDOM_ID}"
    volumes:
      - /home/user/jetbrains/cache:/home/jetbrains/.cache/JetBrains
      - /home/user/sites/top-ticketify:/home/jetbrains/top-ticketify
    restart: unless-stopped
    ports:
      - "2222:22"
    networks:
      - top-ticketify_app-network

  db_service:
    image: mysql:latest
    container_name: top-ticketify-mysql-db
    restart: always
    volumes:
      - ./mysql/allow-remote.cnf:/etc/mysql/conf.d/allow-remote.cnf
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_DATABASE: TopTicketify
    ports:
      - '3307:3306'
    networks:
      - top-ticketify_app-network

  maildev:
    image: maildev/maildev
    container_name: top-ticketify-maildev
    ports:
      - "1080:1080"
      - "1025:1025"

  redis_service:
    image: redis:latest
    container_name: redis_service_top_ticketify
    ports:
      - '6379:6379'
    networks:
      - top-ticketify_app-network

  rabbitmq_service:
    image: rabbitmq:3-management
    container_name: top-ticketify-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - top-ticketify_app-network

volumes:
  rabbitmq_data:
networks:
  top-ticketify_app-network:
    driver: bridge
